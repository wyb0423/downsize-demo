# ============================================================================
# 简体中文本地化 — Simplified Chinese Localization
# ============================================================================
# 格式说明：
#   每行格式： key:数字 "文本"
#   文本中的特殊标记：
#     #bold ...#!      → 粗体字
#     #variable ...#!  → 游戏主色调（通常是金色）
#     \n\n             → 换两行（用于段落分隔）
#     [SCOPE...GetValue|0] → 显示变量值，|0 表示变量不存在时显示 0
#
# 修改指引：
#   - 想改按钮文字？改下面带 _name 的 key
#   - 想改提示文字？改下面带 _desc 的 key
#   - 冒号后面的数字 0 不要改
#   - 文本用双引号包裹
# ============================================================================

l_simp_chinese:

 # ---- 日记条目 ----
 # 日志面板中显示的标题
 je_auto_downsize:0 "私营建筑监管"
 # 日志面板中显示的描述（鼠标悬停时）
 # \n\n 是段落分隔，#bold ...#! 是粗体
 # [SCOPE...GetValue|0] 是显示变量值
 je_auto_downsize_desc:0 "监控并自动缩减私人投资建造的亏损、人手不足的建筑。防止游戏后期投机性过度建造导致的基础设施压力与经济循环崩溃。\n\n#bold 已处理的建筑数:#! [SCOPE.sCountry('root').MakeScope.Var('auto_downsize_buildings_affected').GetValue|0]"

 # ---- 启用/禁用按钮 ----
 # §H...§! = 黄色/金色标题文字
 auto_downsize_toggle_button_name:0 "§H启用自动降级§!"
 auto_downsize_toggle_button_desc:0 "点击以启用或禁用对亏损私营建筑的自动降级。\n\n启用后，人手不足（雇佣率低于50%）、现金储备枯竭（低于25%）且无盈利的建筑将被逐步降低等级。"

 # ---- 频率切换按钮 ----
 auto_downsize_frequency_button_name:0 "§H检查频率§!"
 auto_downsize_frequency_button_desc:0 "点击以在每周检查和每月检查之间切换。\n\n#bold 每周：#! 对问题建筑反应更快。\n#bold 每月（默认）：#! 性能开销较低。"
